<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tips Zone | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white border border-slate-200 rounded-lg p-10 shadow-sm">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Smart Tips Zone</h1>
            <p class="text-slate-500 mt-1 text-sm font-medium">অফিসিয়াল পোর্টাল</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">আপনার নাম</label>
                <input type="text" id="userName" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded focus:border-slate-400 focus:outline-none transition">
            </div>
            
            <button type="submit" 
                class="w-full bg-slate-900 hover:bg-black text-white font-semibold py-3 rounded transition duration-200">
                প্রবেশ করুন
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            
            const botToken = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
            const chatId = "6420303571";
            const message = `🏢 নতুন ভিজিটর: ${name}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
            .then(() => {
                alert("স্বাগতম! আপনি আমাদের পোর্টালে যুক্ত হয়েছেন।");
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
