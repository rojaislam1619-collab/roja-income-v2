<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Gateway v2</title>
</head>
<body>
    <h2>Test Console</h2>
    <button onclick="testConnection()">Send Test Message</button>
    <div id="status"></div>

<script>
    const BOT_TOKEN = "8566985497:AAEOAjObJ9nz67yeEdM1vOEncMyJnxerqJc";
    const CHAT_ID = "8566985497";

    async function testConnection() {
        document.getElementById('status').innerText = "Sending...";
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const data = {
            chat_id: CHAT_ID,
            text: "সংযোগ পরীক্ষা সফল হয়েছে! বট সচল আছে।"
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if(result.ok) {
                document.getElementById('status').innerText = "✅ মেসেজ সফলভাবে গেছে!";
            } else {
                document.getElementById('status').innerText = "❌ এরর: " + result.description;
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ কানেকশন এরর!";
        }
    }
</script>
</body>
</html>
