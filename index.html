<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Tamim's Quiz Arena</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .quiz-card { background: #16213e; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center; border: 2px solid #4ecca3; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #4ecca3; cursor: pointer; font-weight: bold; }
        button:hover { background: #45b791; }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-box">
    <h2 id="question">প্রশ্ন লোড হচ্ছে...</h2>
    <div id="options"></div>
    <p>স্কোর: <span id="score">0</span></p>
</div>

<script>
    // হাজার হাজার প্রশ্ন এখানে যোগ করুন
    const questions = [
        { q: "বাংলাদেশের রাজধানী কী?", options: ["ঢাকা", "চট্টগ্রাম", "সিলেট"], a: "ঢাকা" },
        { q: "সূর্য কোন দিকে ওঠে?", options: ["পূর্ব", "পশ্চিম", "উত্তর"], a: "পূর্ব" },
        { q: "মানুষের শরীরে কয়টি হার?", options: ["২০৬", "২১০", "২০০"], a: "২০৬" }
    ];

    let currentQ = 0;
    let score = 0;
    const BOT_TOKEN = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
    const CHAT_ID = "6420303571";

    function loadQuestion() {
        if(currentQ < questions.length) {
            document.getElementById("question").innerText = questions[currentQ].q;
            const optDiv = document.getElementById("options");
            optDiv.innerHTML = "";
            questions[currentQ].options.forEach(opt => {
                let btn = document.createElement("button");
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                optDiv.appendChild(btn);
            });
        } else {
            document.getElementById("quiz-box").innerHTML = `<h2>কুইজ শেষ! মোট স্কোর: ${score}</h2>`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=ইউজার কুইজ শেষ করেছে। মোট স্কোর: ${score}`);
        }
    }

    function checkAnswer(ans) {
        if(ans === questions[currentQ].a) {
            score += 10;
            document.getElementById("score").innerText = score;
        }
        currentQ++;
        loadQuestion();
    }

    loadQuestion();
</script>
</body>
</html>
