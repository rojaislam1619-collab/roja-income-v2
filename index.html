<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Secure Gateway</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { margin-bottom: 20px; color: #38bdf8; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            box-sizing: border-box; outline: none;
        }
        .btn { 
            width: 100%; padding: 14px; margin: 10px 0; border: none; 
            border-radius: 10px; cursor: pointer; color: white; 
            font-weight: bold; transition: transform 0.2s, background 0.3s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-green { background: #10b981; }
        .btn-blue { background: #3b82f6; }
        .btn-purple { background: #8b5cf6; }
        .btn-orange { background: #f59e0b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card" id="loginSection">
    <h2>🔐 Secure Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter Secret Password...">
    <button class="btn btn-green" onclick="verifyPassword()">Verify Access</button>
</div>

<div class="card hidden" id="dashboard">
    <h2>🚀 Control Panel</h2>
    <button class="btn btn-blue" onclick="alert('ক্যামেরা ও লোকেশন সক্রিয় হচ্ছে...')">Camera & Location</button>
    <button class="btn btn-purple" onclick="alert('গ্যালারি ব্রাউজার ওপেন হচ্ছে...')">Gallery Access</button>
    <button class="btn btn-orange" onclick="alert('স্ক্রিন শেয়ারিং পারমিশন চাইছে...')">Share Screen</button>
</div>

<script>
    function verifyPassword() {
        const pass = document.getElementById('passwordInput').value;
        if(pass === "Tamim0186#@") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else { 
            alert("❌ ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।"); 
        }
    }
</script>

</body>
</html>
