<!DOCTYPE html>
<html>
<head>
    <title>আমাদের আড্ডা রুম</title>
</head>
<body>
    <h1>লুডু ও আড্ডা রুম</h1>
    <input type="text" id="username" placeholder="আপনার নাম লিখুন">
    <button onclick="joinRoom()">রুমে প্রবেশ করুন (ক্যামেরা ও মাইকসহ)</button>

    <div id="video-container"></div>

    <script>
        async function joinRoom() {
            const name = document.getElementById('username').value;
            if(!name) return alert("নাম লিখুন");

            // ১. ক্যামেরা ও মাইক্রোফোন এক্সেস
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video-container').innerHTML = "<video autoplay playsinline muted></video>";
            document.querySelector('video').srcObject = stream;

            // ২. টেলিগ্রাম বোটে নোটিফিকেশন পাঠানো (আপনার বোট টোকেন ও চ্যাট আইডি বসান)
            const botToken = "YOUR_BOT_TOKEN_HERE";
            const chatId = "YOUR_CHAT_ID_HERE";
            const message = `🚨 নতুন বন্ধু রুমে ঢুকেছে: ${name}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`);
            
            alert("রুমে সফলভাবে যুক্ত হয়েছেন!");
        }
    </script>
</body>
</html>
