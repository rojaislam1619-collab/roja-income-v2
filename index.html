<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tips Hub | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 md:p-10">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Smart Tips Hub</h1>
            <p class="text-slate-400 mt-2">আপনার প্রতিদিনের প্রযুক্তি সমাধান</p>
        </div>

        <!-- Tips Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <button onclick="showTip('Computer')" class="p-6 bg-slate-900 border border-slate-800 rounded-2xl hover:border-blue-500 transition">💻 কম্পিউটার</button>
            <button onclick="showTip('Mobile')" class="p-6 bg-slate-900 border border-slate-800 rounded-2xl hover:border-blue-500 transition">📱 মোবাইল</button>
            <button onclick="showTip('TV')" class="p-6 bg-slate-900 border border-slate-800 rounded-2xl hover:border-blue-500 transition">📺 টিভি</button>
        </div>

        <!-- Display Area -->
        <div id="tipDisplay" class="p-8 bg-slate-900 rounded-3xl border border-slate-800 mb-10 hidden">
            <h2 id="tipTitle" class="text-xl font-bold text-blue-400 mb-4"></h2>
            <p id="tipContent" class="text-slate-300 leading-relaxed"></p>
        </div>

        <!-- Feedback / Update Request Section -->
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
            <h3 class="text-lg font-bold mb-4">নতুন আপডেটের অনুরোধ বা সমস্যা জানান</h3>
            <textarea id="feedback" placeholder="আপনার সমস্যা বা আপডেটের আইডিয়া এখানে লিখুন..." class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 outline-none mb-4"></textarea>
            <button onclick="sendFeedback()" class="w-full py-4 bg-emerald-600 rounded-xl font-bold hover:bg-emerald-700 transition">পাঠিয়ে দিন</button>
        </div>
    </div>

    <script>
        const tips = {
            'Computer': "কম্পিউটার স্লো হলে অপ্রয়োজনীয় সফটওয়্যার আনইনস্টল করুন এবং স্টার্টআপ অ্যাপস বন্ধ রাখুন।",
            'Mobile': "ফোন হ্যাং করলে ক্যাশ মেমোরি ক্লিয়ার করুন এবং সফটওয়্যার আপডেট রাখুন।",
            'TV': "টিভি চালু না হলে পাওয়ার কেবল চেক করুন এবং রিমোটের ব্যাটারি পরিবর্তন করুন।"
        };

        function showTip(category) {
            document.getElementById('tipDisplay').classList.remove('hidden');
            document.getElementById('tipTitle').innerText = category + " টিপস";
            document.getElementById('tipContent').innerText = tips[category];
        }

        function sendFeedback() {
            const text = document.getElementById('feedback').value;
            const botToken = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
            const chatId = "6420303571";
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('ফিডব্যাক/সমস্যা: ' + text)}`);
            alert("আপনার মেসেজটি আমাদের কাছে পৌঁছেছে। ধন্যবাদ!");
        }
    </script>
</body>
</html>
