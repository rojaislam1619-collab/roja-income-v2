<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamim's Pro Gaming Arena</title>
    <style>
        :root { --primary: #4ecca3; --dark: #1a1a2e; }
        body { background: radial-gradient(circle, #16213e, #1a1a2e); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 100%; max-width: 500px; margin-bottom: 20px; }
        button { background: var(--primary); border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { box-shadow: 0 0 15px var(--primary); transform: scale(1.05); }
        textarea { width: 90%; height: 80px; border-radius: 10px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Tamim's Pro Arena</h1>
    <p>আপনার পছন্দের গেমটি বেছে নিন</p>
    <button onclick="logGame('ক্লিক মাস্টার')">⚡ ক্লিক মাস্টার</button>
    <button onclick="logGame('কালার পাজল')">🎨 কালার পাজল</button>
</div>

<div class="card" id="update-section">
    <h3>📢 নতুন আপডেট চাই?</h3>
    <textarea id="user-request" placeholder="আপনার প্রয়োজনীয় আপডেট বা মতামত এখানে লিখুন..."></textarea><br>
    <button onclick="sendUpdateRequest()">আপডেট পাঠান</button>
</div>

<script>
    const BOT_TOKEN = "8853221737:AAHDigRYNltTvdFGZW4gZahuu3M9dlJHENU";
    const CHAT_ID = "6420303571";

    // গেমের অ্যাকশন লগিং
    function logGame(gameName) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=ইউজার গেম খেলছে: ${gameName}`);
        alert(gameName + " শুরু হয়েছে!");
    }

    // নতুন আপডেট বা মতামত পাঠানোর ফাংশন
    function sendUpdateRequest() {
        const msg = document.getElementById('user-request').value;
        if(msg.trim() === "") return alert("দয়া করে কিছু লিখুন!");
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=নতুন আপডেট রিকোয়েস্ট: ${msg}`);
        alert("আপনার মতামত পাঠানো হয়েছে! আমি শীঘ্রই রিপ্লাই দেবো।");
        document.getElementById('user-request').value = "";
    }

    // ২ ঘণ্টা পর মেসেজ/এলিমেট অটো-ডিলিট সিস্টেম
    // এখানে আমরা একটি মেকানিজম সেট করছি যা ২ ঘণ্টা (৭২০০০০০ মিলি সেকেন্ড) পর এলিমেন্ট হাইড করবে
    setTimeout(() => {
        document.getElementById('update-section').style.display = 'none';
        console.log("পুরানো আপডেট সেকশন মুছে ফেলা হয়েছে।");
    }, 7200000); 

</script>

</body>
</html>
